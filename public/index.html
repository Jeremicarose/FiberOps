<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FiberOps | Infrastructure Desktop</title>
    <meta
      name="description"
      content="Workspace-based Fiber infrastructure desktop for diagnostics, routing, node inspection, activity review, and configuration."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar-shell">
        <div class="brand-block">
          <p class="brand-kicker">Fiber desktop</p>
          <h1>FiberOps</h1>
          <span
            id="bootstrap-badge"
            class="status-chip"
            data-bootstrap-state="loading"
            >Bootstrapping</span
          >
        </div>

        <nav class="workspace-nav" aria-label="Primary workspaces">
          <button
            type="button"
            class="workspace-nav__item is-active"
            data-nav-workspace="overview"
          >
            Overview
          </button>
          <button
            type="button"
            class="workspace-nav__item"
            data-nav-workspace="nodes"
          >
            Nodes
          </button>
          <button
            type="button"
            class="workspace-nav__item"
            data-nav-workspace="channels"
          >
            Channels
          </button>
          <button
            type="button"
            class="workspace-nav__item"
            data-nav-workspace="routing"
          >
            Routing
          </button>
          <button
            type="button"
            class="workspace-nav__item"
            data-nav-workspace="diagnostics"
          >
            Diagnostics
          </button>
          <button
            type="button"
            class="workspace-nav__item"
            data-nav-workspace="activity"
          >
            Activity
          </button>
          <button
            type="button"
            class="workspace-nav__item"
            data-nav-workspace="testing"
          >
            Testing
          </button>
          <button
            type="button"
            class="workspace-nav__item"
            data-nav-workspace="configuration"
          >
            Configuration
          </button>
        </nav>

        <div class="sidebar-footer">
          <p
            id="bootstrap-message"
            class="sidebar-note"
            data-bootstrap-state="loading"
          >
            Loading bootstrap payload and runtime context.
          </p>
        </div>
      </aside>

      <div class="main-shell">
        <header class="topbar-shell">
          <button
            type="button"
            class="command-button"
            id="command-palette-button"
            aria-haspopup="dialog"
            aria-controls="command-palette"
          >
            <span class="command-button__label">Search everywhere</span>
            <span class="command-button__hint">Workspaces, nodes, history, actions</span>
            <span class="command-button__shortcut">⌘K</span>
          </button>
          <div class="topbar-actions">
            <div class="mode-toggle" aria-label="Mode selector">
              <button
                type="button"
                class="mode-toggle__button is-active"
                data-mode-button="demo"
              >
                Demo
              </button>
              <button
                type="button"
                class="mode-toggle__button"
                data-mode-button="live"
              >
                Live
              </button>
            </div>
            <div id="status-summary" class="status-summary">
              Waiting for runtime status
            </div>
          </div>
        </header>

        <main class="workspace-canvas">
          <section id="workspace-root" aria-live="polite"></section>
          <aside id="inspector-drawer" class="inspector-drawer" hidden>
            <div class="inspector-drawer__surface">
              <div class="inspector-drawer__head">
                <div>
                  <p class="workspace-kicker">Inspector</p>
                  <h3 id="inspector-title">Selected detail</h3>
                </div>
                <div class="inspector-drawer__actions">
                  <button
                    type="button"
                    class="ghost-button"
                    id="inspector-toggle-mode"
                  >
                    Float
                  </button>
                  <button
                    type="button"
                    class="ghost-button"
                    id="inspector-close"
                  >
                    Close
                  </button>
                </div>
              </div>
              <div id="inspector-content"></div>
            </div>
          </aside>
          <section id="notification-tray" class="notification-tray" hidden>
            <div class="notification-tray__surface">
              <div class="notification-tray__head">
                <div>
                  <p class="workspace-kicker">Notifications</p>
                  <h3>Recent activity and alerts</h3>
                </div>
              </div>
              <div id="notification-tray-list" class="notification-tray__list"></div>
            </div>
          </section>
          <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
        </main>

        <footer class="statusbar-shell">
          <div class="statusbar-group">
            <span>Environment</span>
            <strong id="status-environment">Loading</strong>
          </div>
          <div class="statusbar-group">
            <span>Connection</span>
            <strong id="status-connection">Unknown</strong>
          </div>
          <div class="statusbar-group">
            <span>Sync</span>
            <strong id="status-sync">Idle</strong>
          </div>
          <button
            type="button"
            class="statusbar-group statusbar-group--button"
            id="notification-button"
            aria-expanded="false"
            aria-controls="notification-tray"
          >
            <span>Notifications</span>
            <strong id="status-notifications">0</strong>
          </button>
        </footer>
      </div>
    </div>

    <dialog id="command-palette" class="command-palette">
      <form method="dialog" class="command-palette__surface">
        <div class="command-palette__head">
          <label for="command-query">Search everywhere</label>
          <div class="command-palette__head-actions">
            <span class="command-palette__hint">↑ ↓ move · ↵ open · esc close</span>
            <button type="submit" class="ghost-button">Close</button>
          </div>
        </div>
        <input
          id="command-query"
          type="search"
          placeholder="Jump to diagnostics, open a node, copy an endpoint, rerun a route…"
        />
        <div id="command-results" class="command-results" role="listbox"></div>
      </form>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
