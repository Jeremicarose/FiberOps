name: Bug report
description: Report a broken workflow, regression, or incorrect diagnosis.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
      placeholder: FiberOps reports a route as ready even though the dry-run probe fails.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the commands, API payloads, or UI steps needed to reproduce the issue.
      placeholder: |
        1. Run npm run dev
        2. Open the browser UI
        3. Select a live preset
        4. Submit the diagnose request
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant output
      description: Paste logs, screenshots, or diagnosis payloads if available. Redact secrets and tokens.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0, main, or a commit SHA
